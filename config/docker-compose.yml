# docker-compose.yml
version: '3.8'

services:
  # Основной сервер с генератором
  generator-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PORT=8000
      - LOG_LEVEL=INFO
    command: python server.py
  
  # MLflow для экспериментов (опционально)
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000
  
  # PostgreSQL для хранения метаданных (опционально)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # Redis для кэша (опционально)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
